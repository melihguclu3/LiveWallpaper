name: LiveWallpaper
options:
  bundleIdPrefix: com.melih
  deploymentTarget:
    macOS: "14.0"
  xcodeVersion: "16.0"
  developmentLanguage: en

targets:
  LiveWallpaper:
    type: application
    platform: macOS
    sources:
      - path: Sources
      - path: Resources/Assets.xcassets
        buildPhase: resources
      - path: Resources/en.lproj
        buildPhase: resources
      - path: Resources/tr.lproj
        buildPhase: resources
    info:
      path: Info.plist
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.melih.LiveWallpaper
        PRODUCT_NAME: LiveWallpaper
        MARKETING_VERSION: "2.0"
        CURRENT_PROJECT_VERSION: "1"
        SWIFT_VERSION: "5.9"
        MACOSX_DEPLOYMENT_TARGET: "14.0"
        COMBINE_HIDPI_IMAGES: true
        INFOPLIST_KEY_LSUIElement: true
        CODE_SIGN_IDENTITY: "-"
        CODE_SIGN_STYLE: Manual
